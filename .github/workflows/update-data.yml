name: Update signaux RSS

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-signaux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update signaux from RSS
        run: python scripts/update-signaux.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signaux.json
          if git diff --staged --quiet; then
            echo "Aucun changement dans signaux.json"
            exit 0
          fi
          git commit -m "chore: update signaux RSS [automated]"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin main; then
              echo "Push réussi"
              exit 0
            fi
            echo "Push rejeté, tentative $attempt/3..."
            sleep 3
          done
          echo "Échec du push après 3 tentatives"
          exit 1
